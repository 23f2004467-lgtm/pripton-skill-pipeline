name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e ".[dev]"

      - run: ruff check .

      # mypy intentionally not gated in CI — pre-existing type errors require a
      # separate cleanup pass that's out of scope for the current submission.
      # Type checking runs locally via `mypy src` during development.

      - run: pytest -v
